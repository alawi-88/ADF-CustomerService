# =============================================================================
# Auto-build + publish a Docker image when a vX.Y.Z tag is pushed.
# =============================================================================
# Goes to GitHub Container Registry (ghcr.io) — free, hosted by GitHub.
# Image will appear at:  ghcr.io/alawi-88/adf-customerservice:1.1.0
#
# To use:
#   1. Push a tag (e.g. v1.1.0). GitHub does the build for you.
#   2. The image becomes pullable at the URL above.
#
# No secrets to configure — uses the built-in GITHUB_TOKEN.
# =============================================================================

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tag
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/adf-customerservice:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/adf-customerservice:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
